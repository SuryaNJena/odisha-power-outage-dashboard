name: Scrape & Deploy

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: write      # to commit outage_data.json back to repo
  pages: write         # to deploy to GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (fetch latest outage data)
        run: python scrap.py
        # scrap.py writes CSVs to scrappedData/

      - name: Process CSVs → public/outage_data.json
        run: python process.py
        # process.py writes public/outage_data.json

      - name: Commit updated data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the processed JSON — scrappedData/ is gitignored (CSVs are ephemeral)
          git add public/outage_data.json
          git diff --cached --quiet || git commit -m "chore: update outage data [skip ci]"
          git push
        # [skip ci] prevents a new workflow trigger on the data-only commit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /odisha-power-outage-dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
